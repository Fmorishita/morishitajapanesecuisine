<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Editor de Contenido — Morishita</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#050505;--surface:#0a0a0a;--surface2:#111;
    --fg:#f5f5f5;--muted:#888;--border:#1f1f1f;
    --gold:#c8a97e;--gold-h:#e0c298;--red:#e66;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;min-height:100vh;}

  /* LOGIN */
  .login{max-width:360px;margin:15vh auto;padding:48px 40px;background:linear-gradient(145deg,var(--surface),#000);border:1px solid var(--border);border-radius:4px;text-align:center;}
  .login h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;letter-spacing:2px;margin-bottom:8px;}
  .login p{color:var(--muted);font-size:13px;margin-bottom:32px;}
  .login input{width:100%;background:rgba(255,255,255,.02);border:1px solid var(--border);color:var(--fg);padding:16px;border-radius:4px;font-family:'Inter',sans-serif;font-size:13px;letter-spacing:2px;text-align:center;outline:none;transition:border-color .3s;margin-bottom:20px;}
  .login input:focus{border-color:var(--gold);}
  .login button{width:100%;background:var(--gold);color:#000;border:none;padding:16px;border-radius:4px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;transition:.3s;}
  .login button:hover{background:var(--gold-h);}

  /* LAYOUT */
  .app{display:none;min-height:100vh;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
  .topbar-brand{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;letter-spacing:1px;}
  .topbar-actions{display:flex;align-items:center;gap:16px;}
  .preview-btn{background:transparent;border:1px solid var(--border);color:var(--fg);padding:8px 18px;border-radius:4px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:.3s;}
  .preview-btn:hover{border-color:var(--gold);color:var(--gold);}
  .admin-link{color:var(--muted);font-size:12px;text-decoration:none;letter-spacing:1px;}
  .admin-link:hover{color:var(--gold);}

  /* BODY */
  .body{display:flex;min-height:calc(100vh - 60px);}

  /* SIDEBAR */
  .sidebar{width:220px;min-width:220px;border-right:1px solid var(--border);padding:24px 0;background:var(--surface);}
  .sidebar-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:0 20px 12px;}
  .nav-item{display:block;padding:10px 20px;font-size:13px;color:var(--muted);cursor:pointer;transition:color .2s,background .2s;border-left:2px solid transparent;}
  .nav-item:hover{color:var(--fg);background:rgba(255,255,255,.02);}
  .nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(200,169,126,.04);}

  /* CONTENT */
  .content{flex:1;padding:40px 48px;max-width:860px;}
  .section-header{margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border);}
  .section-header h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;margin-bottom:6px;}
  .section-header p{color:var(--muted);font-size:13px;}

  /* FIELDS */
  .field{margin-bottom:28px;}
  .field-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .field-label .tip{font-size:10px;color:var(--muted);letter-spacing:0;text-transform:none;}
  .field textarea,.field input[type=text],.field input[type=url]{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--fg);padding:14px 16px;border-radius:4px;font-family:'Inter',sans-serif;font-size:13px;line-height:1.6;outline:none;transition:border-color .3s;resize:vertical;}
  .field textarea{min-height:80px;}
  .field textarea:focus,.field input[type=text]:focus,.field input[type=url]:focus{border-color:var(--gold);}
  .field-actions{display:flex;gap:10px;margin-top:10px;align-items:center;}
  .btn-save{background:var(--gold);color:#000;border:none;padding:9px 20px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.2s;}
  .btn-save:hover{background:var(--gold-h);}
  .btn-save:disabled{opacity:.4;cursor:default;}
  .save-status{font-size:12px;color:var(--muted);}
  .save-status.ok{color:#7ec47e;}
  .save-status.err{color:var(--red);}

  /* IMAGE FIELDS */
  .img-field{display:flex;gap:24px;align-items:flex-start;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:20px;}
  .img-preview{width:140px;min-width:140px;height:100px;border-radius:4px;overflow:hidden;background:#111;border:1px solid var(--border);flex-shrink:0;}
  .img-preview img{width:100%;height:100%;object-fit:cover;display:block;}
  .img-info{flex:1;}
  .img-info p{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:14px;}
  .img-upload-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .btn-upload{background:transparent;border:1px solid var(--border);color:var(--fg);padding:9px 18px;border-radius:4px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.3s;}
  .btn-upload:hover{border-color:var(--gold);color:var(--gold);}
  input[type=file]{display:none;}
  .upload-note{font-size:11px;color:var(--muted);}

  /* DIVIDERS */
  .divider{border:none;border-top:1px solid var(--border);margin:36px 0;}

  /* TOAST */
  .toast{position:fixed;bottom:32px;right:32px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:14px 20px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:.3s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.toast-ok{border-color:rgba(126,196,126,.4);color:#7ec47e;}
  .toast.toast-err{border-color:rgba(230,102,102,.4);color:var(--red);}

  /* HTML hint */
  .html-hint{font-size:11px;color:var(--muted);margin-top:6px;font-family:'Inter',monospace;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
  <h1>森下 ADMIN</h1>
  <p>Panel de contenido del sitio</p>
  <input type="password" id="pinInput" placeholder="PIN DE ACCESO" onkeyup="if(event.key==='Enter')checkPin()"/>
  <button onclick="checkPin()">ENTRAR</button>
</div>

<!-- APP -->
<div class="app" id="appScreen">
  <div class="topbar">
    <span class="topbar-brand">森下 Editor de Contenido</span>
    <div class="topbar-actions">
      <a href="/" target="_blank" class="preview-btn">Ver sitio ↗</a>
      <a href="/admin" class="admin-link">← Reservas</a>
    </div>
  </div>
  <div class="body">
    <nav class="sidebar">
      <div class="sidebar-label">Secciones</div>
      <div class="nav-item active" onclick="showSection('hero')">Hero principal</div>
      <div class="nav-item" onclick="showSection('pilares')">Pilares</div>
      <div class="nav-item" onclick="showSection('producto')">El producto</div>
      <div class="nav-item" onclick="showSection('chef')">El chef</div>
      <div class="nav-item" onclick="showSection('testimonios')">Testimonios</div>
      <div class="nav-item" onclick="showSection('faq')">FAQ</div>
      <div class="nav-item" onclick="showSection('footer')">Footer</div>
      <div class="nav-item" onclick="showSection('imagenes')">Imágenes</div>
    </nav>
    <main class="content" id="mainContent"></main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let ADMIN_TOKEN = '';
let CONTENT = {};

// ── AUTH ──
function checkPin(){
  const pin = document.getElementById('pinInput').value;
  if(!pin) return;
  ADMIN_TOKEN = pin;
  loadContent();
}

// ── LOAD (via backend — sin exponer service role en browser) ──
async function loadContent(){
  try{
    const r = await fetch('/api/content');
    if(!r.ok) throw new Error('HTTP '+r.status);
    CONTENT = await r.json();
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    showSection('hero');
  }catch(e){
    showToast('Error cargando contenido: '+e.message, true);
    alert('PIN incorrecto o error de conexión. Intenta de nuevo.');
  }
}

function val(key, fallback=''){
  return CONTENT[key] !== undefined ? CONTENT[key] : fallback;
}

// ── SAVE TEXT ──
async function saveField(key, value, statusEl){
  if(statusEl){ statusEl.textContent='Guardando...'; statusEl.className='save-status'; }
  try{
    const r = await fetch('/api/content/update',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-token':ADMIN_TOKEN},
      body: JSON.stringify({key,value})
    });
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||'Error desconocido');
    CONTENT[key] = value;
    if(statusEl){ statusEl.textContent='✓ Guardado'; statusEl.className='save-status ok'; setTimeout(()=>{ if(statusEl)statusEl.textContent=''; },3000); }
    showToast('Guardado: '+key);
  }catch(e){
    if(statusEl){ statusEl.textContent='✗ '+e.message; statusEl.className='save-status err'; }
    showToast('Error: '+e.message, true);
  }
}

// ── UPLOAD IMAGE ──
async function uploadImage(key, file, previewEl, statusEl){
  if(!file) return;
  const MAX_MB = 8;
  if(file.size > MAX_MB*1024*1024){ showToast('Imagen demasiado grande (máx '+MAX_MB+'MB)', true); return; }
  if(statusEl){ statusEl.textContent='Subiendo...'; statusEl.className='save-status'; }
  const reader = new FileReader();
  reader.onload = async function(e){
    const base64 = e.target.result.split(',')[1];
    try{
      const r = await fetch('/api/content/upload-image',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-admin-token':ADMIN_TOKEN},
        body: JSON.stringify({key, filename:file.name, data:base64, type:file.type})
      });
      const j = await r.json();
      if(!r.ok) throw new Error(j.error||'Error desconocido');
      CONTENT[key] = j.url;
      if(previewEl) previewEl.src = j.url;
      if(statusEl){ statusEl.textContent='✓ Imagen actualizada'; statusEl.className='save-status ok'; setTimeout(()=>{ if(statusEl)statusEl.textContent=''; },3000); }
      showToast('Imagen guardada');
    }catch(e){
      if(statusEl){ statusEl.textContent='✗ '+e.message; statusEl.className='save-status err'; }
      showToast('Error: '+e.message, true);
    }
  };
  reader.readAsDataURL(file);
}

// ── TOAST ──
let toastTimer;
function showToast(msg, isErr=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show '+(isErr?'toast-err':'toast-ok');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.className='toast'; }, 3000);
}

// ── HELPERS ──
function field(key, label, opts={}){
  const {multiline=true, html=false, url=false, fallback=''} = opts;
  const id = 'f_'+key.replace(/\./g,'_');
  const statusId = 's_'+key.replace(/\./g,'_');
  const inputType = url ? 'url' : 'text';
  const inputEl = multiline && !url
    ? `<textarea id="${id}">${escHtml(val(key, fallback))}</textarea>`
    : `<input type="${inputType}" id="${id}" value="${escAttr(val(key, fallback))}"/>`;
  const htmlHint = html ? `<div class="html-hint">Acepta etiquetas &lt;em&gt; para cursiva</div>` : '';
  return `
    <div class="field">
      <div class="field-label">${label}${html?'<span class="tip">· acepta HTML básico</span>':''}</div>
      ${inputEl}
      ${htmlHint}
      <div class="field-actions">
        <button class="btn-save" onclick="saveField('${key}',document.getElementById('${id}').value,document.getElementById('${statusId}'))">Guardar</button>
        <span class="save-status" id="${statusId}"></span>
      </div>
    </div>`;
}

function imgField(key, label, defaultSrc, altText){
  const id = 'img_'+key.replace(/\./g,'_');
  const fileId = 'file_'+key.replace(/\./g,'_');
  const statusId = 'imgs_'+key.replace(/\./g,'_');
  const src = val(key, defaultSrc);
  return `
    <div class="field">
      <div class="field-label">${label}</div>
      <div class="img-field">
        <div class="img-preview"><img id="${id}" src="${escAttr(src)}" alt="${escAttr(altText)}"/></div>
        <div class="img-info">
          <p>Formatos: JPG, PNG, WebP · Máximo 8 MB.<br>La imagen se sube a Supabase Storage y se aplica automáticamente al sitio.</p>
          <div class="img-upload-row">
            <input type="file" id="${fileId}" accept="image/*" onchange="uploadImage('${key}',this.files[0],document.getElementById('${id}'),document.getElementById('${statusId}'))"/>
            <button class="btn-upload" onclick="document.getElementById('${fileId}').click()">Cambiar imagen</button>
            <span class="save-status" id="${statusId}"></span>
          </div>
        </div>
      </div>
    </div>`;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return String(s).replace(/"/g,'&quot;'); }

// ── SECTIONS ──

      ${field('pilares.p1.num','Pilar 1 · Número/etiqueta',{multiline:false,fallback:'01 · El producto manda'})}

      ${field('pilares.p2.title','Pilar 2 · Título',{multiline:false,fallback:'Una barra. Dos noches por semana.'})}
      ${field('pilares.p2.body','Pilar 2 · Texto',{fallback:'Solo abrimos sábado y domingo. Cuatro lugares por servicio.'})}
      <hr class="divider"/>
      ${field('pilares.p3.num','Pilar 3 · Número/etiqueta',{multiline:false,fallback:'03 · Catorce tiempos'})}

  imagenes: {

    render: ()=>`
      ${imgField('img.hero','Hero principal (barra / ambiente)','/img/hero-bar.jpg','Barra Omakase')}

      ${imgField('img.wagyu','Wagyu A5 (imagen grande de producto)','/img/wagyu-hero.jpg','Wagyu A5')}
      <hr class="divider"/>
      ${imgField('img.carne','Producto: Carne (Wagyu nigiri)','/img/producto-carne.jpg','Wagyu nigiri')}
      <hr class="divider"/>
      ${imgField('img.pescado','Producto: Pescado (toro / sashimi)','/img/producto-pescado.jpg','Toro sashimi')}
      <hr class="divider"/>
      ${imgField('img.base','Producto: Base (arroz / nigiri)','/img/producto-base.jpg','Nigiri arroz')}

      ${imgField('img.chef','Chef Morishita (retrato)','/img/chef-morishita.jpg','Chef Morishita')}
    `
  }
};

// ── NAV ──
let currentSection = 'hero';
function showSection(key){
  currentSection = key;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.textContent === SECTIONS[key].title ||
      el.getAttribute('onclick') === `showSection('${key}')`);
  });
  const s = SECTIONS[key];
  document.getElementById('mainContent').innerHTML = `
    <div class="section-header">
      <h2>${s.title}</h2>
      <p>${s.desc}</p>
    </div>
    ${s.render()}
  `;
}
</script>
