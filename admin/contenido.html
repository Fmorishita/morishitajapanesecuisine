<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Editor de Contenido — Morishita</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#050505;--surface:#0a0a0a;--surface2:#111;
    --fg:#f5f5f5;--muted:#888;--border:#1f1f1f;
    --gold:#c8a97e;--gold-h:#e0c298;--red:#e66;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;overflow:hidden;}

  /* LOGIN */
  .login{max-width:360px;margin:15vh auto;padding:48px 40px;background:linear-gradient(145deg,var(--surface),#000);border:1px solid var(--border);border-radius:4px;text-align:center;}
  .login h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;letter-spacing:2px;margin-bottom:8px;}
  .login p{color:var(--muted);font-size:13px;margin-bottom:32px;}
  .login input{width:100%;background:rgba(255,255,255,.02);border:1px solid var(--border);color:var(--fg);padding:16px;border-radius:4px;font-family:'Inter',sans-serif;font-size:13px;letter-spacing:2px;text-align:center;outline:none;transition:border-color .3s;margin-bottom:20px;}
  .login input:focus{border-color:var(--gold);}
  .login button{width:100%;background:var(--gold);color:#000;border:none;padding:16px;border-radius:4px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;transition:.3s;}
  .login button:hover{background:var(--gold-h);}

  /* APP LAYOUT */
  .app{display:none;height:100vh;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .topbar-brand{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;letter-spacing:1px;}
  .topbar-actions{display:flex;align-items:center;gap:12px;}
  .preview-btn{background:transparent;border:1px solid var(--border);color:var(--fg);padding:7px 14px;border-radius:4px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:.3s;}
  .preview-btn:hover{border-color:var(--gold);color:var(--gold);}
  .preview-btn.primary{background:var(--gold);color:#000;border-color:var(--gold);}
  .preview-btn.primary:hover{background:var(--gold-h);border-color:var(--gold-h);color:#000;}
  .admin-link{color:var(--muted);font-size:11px;text-decoration:none;letter-spacing:1px;}
  .admin-link:hover{color:var(--gold);}
  .reload-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 12px;border-radius:4px;cursor:pointer;font-size:13px;transition:.2s;}
  .reload-btn:hover{border-color:var(--gold);color:var(--gold);}

  /* SPLIT VIEW */
  .split{display:grid;grid-template-columns:480px 1fr;flex:1;overflow:hidden;}
  .editor-pane{display:grid;grid-template-columns:170px 1fr;overflow:hidden;border-right:1px solid var(--border);}
  .preview-pane{position:relative;background:#1a1a17;overflow:hidden;}
  .preview-pane iframe{width:100%;height:100%;border:0;display:block;background:#faf8f4;}
  .preview-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a17;color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase;pointer-events:none;transition:opacity .3s;}
  .preview-loading.hide{opacity:0;}

  /* SIDEBAR */
  .sidebar{border-right:1px solid var(--border);padding:16px 0;background:var(--surface);overflow-y:auto;}
  .sidebar-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:0 16px 10px;}
  .nav-item{display:block;padding:9px 16px;font-size:12px;color:var(--muted);cursor:pointer;transition:color .2s,background .2s;border-left:2px solid transparent;}
  .nav-item:hover{color:var(--fg);background:rgba(255,255,255,.02);}
  .nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(200,169,126,.04);}

  /* CONTENT */
  .content{padding:24px 24px 60px;overflow-y:auto;}
  .section-header{margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .section-header h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;margin-bottom:4px;}
  .section-header p{color:var(--muted);font-size:12px;line-height:1.5;}

  /* FIELDS */
  .field{margin-bottom:20px;scroll-margin-top:24px;}
  .field-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .field-label .tip{font-size:10px;color:var(--muted);letter-spacing:0;text-transform:none;}
  .field textarea,.field input[type=text],.field input[type=url]{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--fg);padding:11px 13px;border-radius:4px;font-family:'Inter',sans-serif;font-size:12px;line-height:1.55;outline:none;transition:border-color .25s, box-shadow .25s;resize:vertical;}
  .field textarea{min-height:64px;}
  .field textarea:focus,.field input[type=text]:focus,.field input[type=url]:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,126,.08);}
  .field.ck-highlighted textarea, .field.ck-highlighted input{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,126,.18);}
  .field-actions{display:flex;gap:8px;margin-top:8px;align-items:center;}
  .btn-save{background:var(--gold);color:#000;border:none;padding:7px 16px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.2s;}
  .btn-save:hover{background:var(--gold-h);}
  .btn-save:disabled{opacity:.4;cursor:default;}
  .save-status{font-size:11px;color:var(--muted);}
  .save-status.ok{color:#7ec47e;}
  .save-status.err{color:var(--red);}
  .save-status.dirty{color:var(--gold);}

  /* IMAGE FIELDS */
  .img-field{display:flex;gap:14px;align-items:flex-start;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px;}
  .img-preview{width:96px;min-width:96px;height:72px;border-radius:3px;overflow:hidden;background:#111;border:1px solid var(--border);flex-shrink:0;}
  .img-preview img{width:100%;height:100%;object-fit:cover;display:block;}
  .img-info{flex:1;min-width:0;}
  .img-info p{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
  .img-upload-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .btn-upload{background:transparent;border:1px solid var(--border);color:var(--fg);padding:7px 14px;border-radius:4px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.3s;}
  .btn-upload:hover{border-color:var(--gold);color:var(--gold);}
  input[type=file]{display:none;}

  /* ORDER LIST */
  .order-list{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:6px;}
  .order-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:3px;margin-bottom:5px;}
  .order-item:last-child{margin-bottom:0;}
  .order-num{font-size:10px;color:var(--muted);font-weight:600;min-width:16px;}
  .order-label{flex:1;font-size:12px;color:var(--fg);}
  .order-btn{background:transparent;border:1px solid var(--border);color:var(--fg);width:26px;height:24px;border-radius:3px;font-size:13px;cursor:pointer;transition:.2s;}
  .order-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
  .order-btn:disabled{opacity:.25;cursor:not-allowed;}

  /* TOGGLE */
  .toggle-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:11px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;}
  .toggle-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;}
  .toggle-label{flex:1;font-size:12px;color:var(--fg);}

  /* DIVIDERS */
  .divider{border:none;border-top:1px solid var(--border);margin:24px 0;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:11px 16px;font-size:12px;z-index:999;opacity:0;transform:translateY(8px);transition:.3s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.toast-ok{border-color:rgba(126,196,126,.4);color:#7ec47e;}
  .toast.toast-err{border-color:rgba(230,102,102,.4);color:var(--red);}

  .html-hint{font-size:10px;color:var(--muted);margin-top:4px;}

  /* DEVICE TOGGLE */
  .device-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
  .device-btn{background:transparent;border:0;color:var(--muted);padding:6px 11px;cursor:pointer;font-size:11px;transition:.2s;}
  .device-btn:hover{color:var(--fg);}
  .device-btn.active{background:var(--gold);color:#000;}
  .preview-pane.mobile iframe{max-width:390px;margin:0 auto;height:100%;display:block;border-left:1px solid var(--border);border-right:1px solid var(--border);}
  .preview-pane.tablet iframe{max-width:820px;margin:0 auto;height:100%;display:block;border-left:1px solid var(--border);border-right:1px solid var(--border);}

  /* RESPONSIVE: stack en pantallas chicas */
  @media (max-width: 1100px){
    .split{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}
    .editor-pane{border-right:0;border-bottom:1px solid var(--border);}
    .preview-pane{border-top:1px solid var(--border);}
  }
  @media (max-width: 700px){
    .editor-pane{grid-template-columns:1fr;}
    .sidebar{display:flex;overflow-x:auto;border-right:0;border-bottom:1px solid var(--border);padding:6px;gap:4px;}
    .sidebar-label{display:none;}
    .nav-item{white-space:nowrap;border-left:0;border-bottom:2px solid transparent;padding:8px 12px;flex-shrink:0;}
    .nav-item.active{border-left:0;border-bottom-color:var(--gold);}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
  <h1>森下 ADMIN</h1>
  <p>Panel de contenido del sitio</p>
  <input type="password" id="pinInput" placeholder="PIN DE ACCESO" onkeyup="if(event.key==='Enter')checkPin()"/>
  <button onclick="checkPin()">ENTRAR</button>
</div>

<!-- APP -->
<div class="app" id="appScreen">
  <div class="topbar">
    <span class="topbar-brand">森下 Editor visual</span>
    <div class="topbar-actions">
      <div class="device-toggle">
        <button class="device-btn active" data-device="desktop" onclick="setDevice('desktop')">Desktop</button>
        <button class="device-btn" data-device="tablet" onclick="setDevice('tablet')">Tablet</button>
        <button class="device-btn" data-device="mobile" onclick="setDevice('mobile')">Móvil</button>
      </div>
      <button class="reload-btn" onclick="reloadPreview()" title="Recargar previsualización">↻</button>
      <a href="/" target="_blank" class="preview-btn">Ver sitio ↗</a>
      <a href="/admin" class="admin-link">← Reservas</a>
    </div>
  </div>

  <div class="split">
    <div class="editor-pane">
      <nav class="sidebar">
        <div class="sidebar-label">Secciones</div>
        <div class="nav-item active" data-sec="hero" onclick="showSection('hero')">Hero principal</div>
        <div class="nav-item" data-sec="pilares" onclick="showSection('pilares')">Pilares</div>
        <div class="nav-item" data-sec="producto" onclick="showSection('producto')">El producto</div>
        <div class="nav-item" data-sec="chef" onclick="showSection('chef')">El chef</div>
        <div class="nav-item" data-sec="testimonios" onclick="showSection('testimonios')">Testimonios</div>
        <div class="nav-item" data-sec="faq" onclick="showSection('faq')">FAQ</div>
        <div class="nav-item" data-sec="footer" onclick="showSection('footer')">Footer</div>
        <div class="nav-item" data-sec="imagenes" onclick="showSection('imagenes')">Imágenes</div>
        <div class="nav-item" data-sec="orden" onclick="showSection('orden')">Orden de bloques</div>
        <div class="nav-item" data-sec="botones" onclick="showSection('botones')">Botones</div>
      </nav>
      <main class="content" id="mainContent"></main>
    </div>

    <div class="preview-pane" id="previewPane">
      <div class="preview-loading" id="previewLoading">CARGANDO PREVISUALIZACIÓN…</div>
      <iframe id="previewFrame" src="about:blank" title="Previsualización"></iframe>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let ADMIN_TOKEN = '';
let CONTENT = {};
let IFRAME_READY = false;

// ── AUTH ──
function checkPin(){
  const pin = document.getElementById('pinInput').value;
  if(!pin) return;
  ADMIN_TOKEN = pin;
  loadContent();
}

async function loadContent(){
  try{
    const r = await fetch('/api/content');
    if(!r.ok) throw new Error('HTTP '+r.status);
    CONTENT = await r.json();
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='flex';
    document.getElementById('previewFrame').src = '/?edit=1';
    showSection('hero');
  }catch(e){
    showToast('Error cargando contenido: '+e.message, true);
    alert('PIN incorrecto o error de conexión.');
  }
}

function val(key, fallback=''){
  return CONTENT[key] !== undefined ? CONTENT[key] : fallback;
}

// ── LIVE PREVIEW (parent → iframe) ──
function livePreview(key, value, kind){
  const frame = document.getElementById('previewFrame');
  if(!frame || !frame.contentWindow) return;
  try{ frame.contentWindow.postMessage({type:'ck-preview', key, value, kind}, '*'); }catch(e){}
}

function reloadPreview(){
  const frame = document.getElementById('previewFrame');
  if(!frame) return;
  IFRAME_READY = false;
  document.getElementById('previewLoading').classList.remove('hide');
  frame.src = '/?edit=1&t='+Date.now();
}

// ── DEVICE TOGGLE ──
function setDevice(d){
  const pane = document.getElementById('previewPane');
  pane.classList.remove('mobile','tablet');
  if(d==='mobile') pane.classList.add('mobile');
  if(d==='tablet') pane.classList.add('tablet');
  document.querySelectorAll('.device-btn').forEach(b=>b.classList.toggle('active', b.dataset.device===d));
}

// ── SAVE ──
async function saveField(key, value, statusEl){
  if(statusEl){ statusEl.textContent='Guardando...'; statusEl.className='save-status'; }
  try{
    const r = await fetch('/api/content/update',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-token':ADMIN_TOKEN},
      body: JSON.stringify({key,value})
    });
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||'Error desconocido');
    CONTENT[key] = value;
    if(statusEl){ statusEl.textContent='✓ Guardado'; statusEl.className='save-status ok'; setTimeout(()=>{ if(statusEl)statusEl.textContent=''; },2500); }
    showToast('Guardado: '+key);
  }catch(e){
    if(statusEl){ statusEl.textContent='✗ '+e.message; statusEl.className='save-status err'; }
    showToast('Error: '+e.message, true);
  }
}

// ── COMPRESS IMAGE ──
async function compressImage(file, maxWidth=1920, quality=0.82){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('No se pudo leer la imagen')); };
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      let {width, height} = img;
      if(width > maxWidth){ height = Math.round(height*maxWidth/width); width = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob=>{
        if(!blob) return reject(new Error('Error al comprimir imagen'));
        const reader = new FileReader();
        reader.onload = e => resolve({
          base64: e.target.result.split(',')[1],
          type: 'image/jpeg',
          filename: file.name.replace(/\.[^.]+$/, '.jpg')
        });
        reader.readAsDataURL(blob);
      }, 'image/jpeg', quality);
    };
    img.src = url;
  });
}

async function uploadImage(key, file, previewEl, statusEl){
  if(!file) return;
  const MAX_MB = 15;
  if(file.size > MAX_MB*1024*1024){ showToast('Imagen demasiado grande (máx '+MAX_MB+'MB)', true); return; }
  if(statusEl){ statusEl.textContent='Comprimiendo...'; statusEl.className='save-status'; }
  try{
    const {base64, type, filename} = await compressImage(file);
    if(statusEl){ statusEl.textContent='Subiendo...'; statusEl.className='save-status'; }
    const r = await fetch('/api/content/upload-image',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-token':ADMIN_TOKEN},
      body: JSON.stringify({key, filename, data:base64, type})
    });
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||'Error desconocido');
    CONTENT[key] = j.url;
    if(previewEl) previewEl.src = j.url;
    livePreview(key, j.url, 'src');
    if(statusEl){ statusEl.textContent='✓ Imagen actualizada'; statusEl.className='save-status ok'; setTimeout(()=>{ if(statusEl)statusEl.textContent=''; },2500); }
    showToast('Imagen guardada');
  }catch(e){
    if(statusEl){ statusEl.textContent='✗ '+e.message; statusEl.className='save-status err'; }
    showToast('Error: '+e.message, true);
  }
}

// ── TOAST ──
let toastTimer;
function showToast(msg, isErr=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show '+(isErr?'toast-err':'toast-ok');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.className='toast'; }, 2500);
}

// ── HELPERS ──
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return String(s).replace(/"/g,'&quot;'); }

function field(key, label, opts={}){
  const {multiline=true, html=false, url=false, fallback=''} = opts;
  const id = 'f_'+key.replace(/\./g,'_');
  const statusId = 's_'+key.replace(/\./g,'_');
  const inputType = url ? 'url' : 'text';
  const kind = html ? 'html' : (url ? 'href' : 'text');
  const onInput = `markDirty('${statusId}');livePreview('${key}',this.value,'${kind}')`;
  const inputEl = multiline && !url
    ? `<textarea id="${id}" data-ck-key="${key}" data-ck-kind="${kind}" oninput="${onInput}">${escHtml(val(key, fallback))}</textarea>`
    : `<input type="${inputType}" id="${id}" data-ck-key="${key}" data-ck-kind="${kind}" oninput="${onInput}" value="${escAttr(val(key, fallback))}"/>`;
  const htmlHint = html ? `<div class="html-hint">Acepta &lt;em&gt; para cursiva</div>` : '';
  return `
    <div class="field" data-field-key="${escAttr(key)}">
      <div class="field-label">${label}${html?'<span class="tip">· HTML básico</span>':''}</div>
      ${inputEl}
      ${htmlHint}
      <div class="field-actions">
        <button class="btn-save" onclick="saveField('${key}',document.getElementById('${id}').value,document.getElementById('${statusId}'))">Guardar</button>
        <span class="save-status" id="${statusId}"></span>
      </div>
    </div>`;
}

function markDirty(statusId){
  const el = document.getElementById(statusId);
  if(el && el.textContent !== '✓ Guardado'){
    el.textContent = '● cambios sin guardar';
    el.className = 'save-status dirty';
  }
}

function imgField(key, label, defaultSrc, altText){
  const id = 'img_'+key.replace(/\./g,'_');
  const fileId = 'file_'+key.replace(/\./g,'_');
  const statusId = 'imgs_'+key.replace(/\./g,'_');
  const src = val(key, defaultSrc);
  return `
    <div class="field" data-field-key="${escAttr(key)}">
      <div class="field-label">${label}</div>
      <div class="img-field">
        <div class="img-preview"><img id="${id}" src="${escAttr(src)}" alt="${escAttr(altText)}"/></div>
        <div class="img-info">
          <p>JPG, PNG o WebP · máx 15 MB. Se comprime y sube a Supabase Storage.</p>
          <div class="img-upload-row">
            <input type="file" id="${fileId}" accept="image/*" onchange="uploadImage('${key}',this.files[0],document.getElementById('${id}'),document.getElementById('${statusId}'))"/>
            <button class="btn-upload" onclick="document.getElementById('${fileId}').click()">Cambiar imagen</button>
            <span class="save-status" id="${statusId}"></span>
          </div>
        </div>
      </div>
    </div>`;
}

// ORDER LIST
const ORDER_STATE = {};
function orderList(listId, label, defaultOrder, labels){
  const saved = val(listId+'.order','');
  let order = saved ? saved.split(',').map(s=>s.trim()).filter(Boolean) : defaultOrder.slice();
  defaultOrder.forEach(id=>{ if(!order.includes(id)) order.push(id); });
  order = order.filter(id=>defaultOrder.includes(id));
  ORDER_STATE[listId] = order;
  return `
    <div class="field">
      <div class="field-label">${escHtml(label)}</div>
      <div id="orderlist-${listId}" class="order-list">
        ${order.map((id,i)=>orderItemHtml(listId, id, labels[id]||id, i, order.length)).join('')}
      </div>
      <div class="field-actions" style="margin-top:10px;">
        <button class="btn-save" onclick="saveOrder('${listId}')">Guardar orden</button>
        <span class="save-status" id="ord_${listId}"></span>
      </div>
    </div>`;
}

function orderItemHtml(listId, id, label, idx, total){
  return `
    <div class="order-item" data-id="${escAttr(id)}">
      <span class="order-num">${idx+1}.</span>
      <span class="order-label">${escHtml(label)}</span>
      <button class="order-btn" onclick="moveOrderItem('${listId}','${id}',-1)" ${idx===0?'disabled':''}>↑</button>
      <button class="order-btn" onclick="moveOrderItem('${listId}','${id}',1)" ${idx===total-1?'disabled':''}>↓</button>
    </div>`;
}

function moveOrderItem(listId, id, delta){
  const arr = ORDER_STATE[listId]; if(!arr) return;
  const i = arr.indexOf(id); if(i<0) return;
  const j = i + delta;
  if(j<0 || j>=arr.length) return;
  arr.splice(i,1); arr.splice(j,0,id);
  const container = document.getElementById('orderlist-'+listId);
  if(!container) return;
  const labels = {};
  container.querySelectorAll('.order-item').forEach(el=>{
    const lbl = el.querySelector('.order-label');
    if(lbl) labels[el.dataset.id] = lbl.textContent;
  });
  container.innerHTML = arr.map((id,idx)=>orderItemHtml(listId, id, labels[id]||id, idx, arr.length)).join('');
}

function saveOrder(listId){
  const arr = ORDER_STATE[listId]; if(!arr) return;
  saveField(listId+'.order', arr.join(','), document.getElementById('ord_'+listId)).then(()=>{
    setTimeout(reloadPreview, 300);
  });
}

function toggleField(key, label, defaultOn=true){
  const id = 'tog_'+key.replace(/\./g,'_');
  const stored = val(key, '');
  const isOn = stored === '' ? defaultOn : (stored !== 'false');
  return `
    <div class="field">
      <label class="toggle-row">
        <input type="checkbox" id="${id}" ${isOn?'checked':''} onchange="onToggleChange('${key}', this.checked, 's_${id}')"/>
        <span class="toggle-label">${escHtml(label)}</span>
        <span class="save-status" id="s_${id}"></span>
      </label>
    </div>`;
}

function onToggleChange(key, checked, statusId){
  saveField(key, checked?'true':'false', document.getElementById(statusId)).then(()=>{
    setTimeout(reloadPreview, 300);
  });
}

// ── KEY → SECTION MAP (para click-to-edit) ──
function keyToSection(key){
  if(key.startsWith('hero.')) return 'hero';
  if(key.startsWith('pilares.')) return 'pilares';
  if(key.startsWith('producto.')) return 'producto';
  if(key.startsWith('chef.')) return 'chef';
  if(key.startsWith('social.')) return 'testimonios';
  if(key.startsWith('faq.')) return 'faq';
  if(key.startsWith('footer.')) return 'footer';
  if(key.startsWith('img.')) return 'imagenes';
  if(key.startsWith('cta.')) return 'botones';
  if(/\.order$/.test(key)) return 'orden';
  return null;
}

// Después de mostrar la sección, hacer scroll y resaltar el campo del key dado
function focusFieldInSection(key){
  const field = document.querySelector(`[data-field-key="${(window.CSS&&CSS.escape)?CSS.escape(key):key}"]`);
  if(!field) return;
  field.scrollIntoView({behavior:'smooth', block:'center'});
  field.classList.add('ck-highlighted');
  setTimeout(()=>field.classList.remove('ck-highlighted'), 1800);
  const input = field.querySelector('input,textarea');
  if(input) setTimeout(()=>input.focus(), 350);
}

// ── NAV ──
let currentSection = 'hero';
function showSection(key, opts={}){
  currentSection = key;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.sec === key);
  });
  const s = SECTIONS[key];
  document.getElementById('mainContent').innerHTML = `
    <div class="section-header">
      <h2>${s.title}</h2>
      <p>${s.desc}</p>
    </div>
    ${s.render()}
  `;
  if(opts.focusKey) setTimeout(()=>focusFieldInSection(opts.focusKey), 60);
}

// ── IFRAME MESSAGING ──
window.addEventListener('message', e=>{
  const d = e.data;
  if(!d || typeof d !== 'object') return;
  if(d.type === 'ck-iframe-ready'){
    IFRAME_READY = true;
    document.getElementById('previewLoading').classList.add('hide');
  } else if(d.type === 'ck-clicked'){
    // Click-to-edit: navega a la sección correspondiente y hace focus del campo
    const sec = keyToSection(d.key);
    if(!sec){ showToast('Campo no editable: '+d.key, true); return; }
    if(currentSection !== sec) showSection(sec, {focusKey:d.key});
    else focusFieldInSection(d.key);
  }
});

// Fallback: si el iframe no envía ready en 4s, ocultar el loader
setTimeout(()=>{
  if(!IFRAME_READY) document.getElementById('previewLoading').classList.add('hide');
}, 4000);
